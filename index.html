<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Summarizer</title>
    <style>

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background-color: #fff;
            boder-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: #FB923C;
        }

        h3 {
            text-align: center;
            color: #666;
        }

        p {
            text-align: center;
            color: #555;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 10px 15px;
            background-color: #ffffff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #F97316;
        }

        .summary-output {
            margin-top: 20px;
            BACKGROUND-COLOR: #FFEDD5;
            padding: 15px;
            border-radius: 5px;
            border : 1px solid #ccc;
        }

        #summary-heading {
            margin-top: 8px;
            margin-bottom: 8px;
        }

        #summary-text {
            color: #555;
        }
    </style>

</head>
<body>
    <div class="container">
        <h1>Text Summarizer</h1>
        <h3>using Hugging Face Transformer</h3>
        <p> Write or Paste your content below for quick summarization</p>

        <form id ="summarizer-form">
            <textarea id="dialogue-input" placeholder = "Enter your content here" required></textarea>
            <button type="submit">Summarize</button>




        </form>

        <div class="summary-output">
            <h3 id ="summary-heading">Content Summary:</h3>
            <p id="summary-text"></p>
        </div>
    </div>

     <script>
        document.getElementById("summarizer-form").addEventListener("submit", async (e) => {
            e.preventDefault();
        
            const dialogueInput = document.getElementById("dialogue-input");
            const summaryText = document.getElementById("summary-text");
            const submitButton = e.target.querySelector("button");
        
            const dialogue = dialogueInput.value.trim();
            if (!dialogue) return;
        
            summaryText.innerText = "Processing...";
            submitButton.disabled = true;
        
            try {
                const response = await fetch("/summarize/", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ dialogue }),
                });
        
                if (!response.ok) {
                    throw new Error(`Server error: ${response.status}`);
                }
        
                const data = await response.json();
                summaryText.innerText = data.summary || "No summary returned.";
            } catch (err) {
                
                summaryText.innerText = `Error: ${err.message}`;
            } finally {
                
                submitButton.disabled = false;
            }
        });
    </script>

</body>
</html>
